<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A field note by Zimeng Wang — notes on robotics research, distance fields, motion planning, and robot learning.">
    <meta name="theme-color" content="#0b0b0d">
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
    <title>Note | Zimeng Wang</title>
    <link rel="preload" href="assets/fonts/SpaceGrotesk-var.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="assets/fonts/Inter-var.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="assets/css/studio.css?v=3">
    <script defer src="assets/js/studio.js?v=3"></script>
    <style>
      /* Post reader — page-specific styles */
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 1.8rem;
        font-family: var(--font-display);
        font-size: 0.85rem;
        letter-spacing: 0.02em;
        color: var(--ink-dim);
        transition: color 0.25s;
      }
      .back-link::before {
        content: '←';
        transition: transform 0.25s var(--ease-out);
      }
      .back-link:hover { color: var(--accent-bright); }
      .back-link:hover::before { transform: translateX(-4px); }

      /* Post titles are sentence-length: tune the hero scale down a notch. */
      .page-hero h1 {
        font-size: clamp(2.3rem, 5.6vw, 4.4rem);
        max-width: 24ch;
      }
      .post-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem;
        margin-top: 1.6rem;
      }
      .post-meta time {
        margin-right: 0.6rem;
        font-family: var(--font-display);
        font-size: 0.85rem;
        color: var(--ink-soft);
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }
      .post-body .prose > :first-child { margin-top: 0; }
      .post-footnav {
        max-width: 68ch;
        margin-top: clamp(2.5rem, 6vh, 4rem);
        padding-top: 1.8rem;
        border-top: 1px solid var(--hair-soft);
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 1rem;
        flex-wrap: wrap;
      }
      .post-footnav p {
        font-size: 0.85rem;
        color: var(--ink-soft);
      }
    </style>
  </head>
  <body data-page="post">
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Zimeng Wang home">
        <span class="brand__mark">ZW</span>
        <span class="brand__text">Zimeng Wang</span>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="research.html">Research</a>
        <a href="projects.html">Projects</a>
        <a href="interests.html">Life</a>
        <a href="blog.html" class="is-active">Notes</a>
      </nav>
      <button class="nav-toggle" aria-label="Open navigation" aria-expanded="false"><span></span><span></span></button>
    </header>
    <div class="nav-overlay">
      <a href="index.html">Home</a><a href="research.html">Research</a><a href="projects.html">Projects</a><a href="interests.html">Life</a><a href="blog.html">Notes</a>
    </div>

    <main id="main">
      <section class="page-hero">
        <div class="shell" data-reveal>
          <a class="back-link" href="blog.html">All notes</a>
          <p class="eyebrow"><span class="eyebrow__idx">05</span> Field note</p>
          <h1 data-post-title>Loading note…</h1>
          <p class="lead" data-post-excerpt hidden></p>
          <div class="post-meta" data-post-meta hidden>
            <time data-post-date></time>
            <span class="chip chip--accent" data-post-audience hidden></span>
            <span data-post-tags style="display: contents;"></span>
          </div>
        </div>
      </section>

      <section class="section section--hairline">
        <div class="shell">
          <article class="post-body" data-post-detail data-reveal style="--reveal-order: 1;">
            <div class="prose" data-post-content>
              <p class="muted">Loading note…</p>
            </div>
          </article>
          <nav class="post-footnav" aria-label="Post navigation" data-reveal style="--reveal-order: 2;">
            <a class="text-link" href="blog.html">Back to all notes</a>
            <p>Field notes by Zimeng Wang</p>
          </nav>
        </div>
      </section>
    </main>

    <footer class="site-footer"><div class="shell">
      <p>&copy; <span data-current-year></span> Zimeng Wang — built by hand, no frameworks.</p>
      <div class="footer-links"><a href="research.html">Research</a><a href="projects.html">Projects</a><a href="interests.html">Life</a><a href="blog.html">Notes</a></div>
    </div></footer>

    <script>
      /* Post rendering pipeline, ported from assets/js/site.js so the title
         can live in the page hero: fetch posts.json → find ?post=SLUG →
         fetch the markdown file → render → inject into the .prose body. */
      (function () {
        "use strict";
        var postsPath = "data/posts.json";

        document.addEventListener("DOMContentLoaded", function () {
          var titleEl = document.querySelector("[data-post-title]");
          var contentEl = document.querySelector("[data-post-content]");
          if (!titleEl || !contentEl) return;
          renderPostDetail(titleEl, contentEl);
        });

        async function renderPostDetail(titleEl, contentEl) {
          var slug = new URLSearchParams(window.location.search).get("post");
          if (!slug) {
            showError(titleEl, contentEl, "Choose a post from the blog page.");
            return;
          }
          try {
            var posts = await getJson(postsPath);
            var post = posts.find(function (item) { return item.slug === slug; });
            if (!post) {
              showError(titleEl, contentEl, "Post not found.");
              return;
            }
            var response = await fetch(post.file, { cache: "no-cache" });
            if (!response.ok) throw new Error("Unable to load post file.");
            var markdown = await response.text();

            document.title = post.title + " | Zimeng Wang";
            var desc = document.querySelector('meta[name="description"]');
            if (desc && post.excerpt) desc.setAttribute("content", post.excerpt);

            titleEl.textContent = post.title;
            fillHeroMeta(post);

            var body = stripFrontMatter(markdown);
            body = stripLeadingTitle(body, post.title);
            contentEl.innerHTML = renderMarkdown(body);
          } catch (error) {
            showError(titleEl, contentEl, "Post could not be loaded.");
          }
        }

        function fillHeroMeta(post) {
          var excerptEl = document.querySelector("[data-post-excerpt]");
          if (excerptEl && post.excerpt) {
            excerptEl.textContent = post.excerpt;
            excerptEl.hidden = false;
          }
          var metaEl = document.querySelector("[data-post-meta]");
          if (!metaEl) return;
          var dateEl = metaEl.querySelector("[data-post-date]");
          if (dateEl && post.date) {
            dateEl.setAttribute("datetime", post.date);
            dateEl.textContent = formatDate(post.date);
          }
          var audienceEl = metaEl.querySelector("[data-post-audience]");
          if (audienceEl) {
            audienceEl.textContent = post.audience || "General";
            audienceEl.hidden = false;
          }
          var tagsEl = metaEl.querySelector("[data-post-tags]");
          if (tagsEl && Array.isArray(post.tags)) {
            tagsEl.textContent = "";
            post.tags.forEach(function (tag) {
              var chip = document.createElement("span");
              chip.className = "chip";
              chip.textContent = tag;
              tagsEl.appendChild(chip);
            });
          }
          metaEl.hidden = false;
        }

        function showError(titleEl, contentEl, message) {
          titleEl.textContent = "Note unavailable";
          contentEl.innerHTML = "";
          var p = document.createElement("p");
          p.className = "muted";
          p.textContent = message + " ";
          var a = document.createElement("a");
          a.href = "blog.html";
          a.textContent = "Browse all notes";
          p.appendChild(a);
          p.appendChild(document.createTextNode("."));
          contentEl.appendChild(p);
        }

        async function getJson(path) {
          var response = await fetch(path, { cache: "no-cache" });
          if (!response.ok) throw new Error("Unable to load " + path);
          return response.json();
        }

        function formatDate(value) {
          if (!value) return "";
          var date = new Date(value + "T00:00:00");
          return new Intl.DateTimeFormat("en", {
            year: "numeric",
            month: "short",
            day: "numeric"
          }).format(date);
        }

        function stripFrontMatter(markdown) {
          return markdown.replace(/^---[\s\S]*?---\s*/, "");
        }

        /* The hero already shows the title; drop a leading `# Title` heading
           from the markdown only when it duplicates it exactly. */
        function stripLeadingTitle(markdown, title) {
          var match = markdown.match(/^\s*#\s+(.+)\s*\n/);
          if (match && match[1].trim() === String(title).trim()) {
            return markdown.slice(match[0].length);
          }
          return markdown;
        }

        function renderMarkdown(markdown) {
          var lines = markdown.replace(/\r\n/g, "\n").split("\n");
          var html = [];
          var paragraph = [];
          var listItems = [];
          var inCode = false;
          var codeLines = [];

          function flushParagraph() {
            if (paragraph.length) {
              html.push("<p>" + inlineMarkdown(paragraph.join(" ")) + "</p>");
              paragraph = [];
            }
          }

          function flushList() {
            if (listItems.length) {
              html.push("<ul>" + listItems.map(function (item) {
                return "<li>" + inlineMarkdown(item) + "</li>";
              }).join("") + "</ul>");
              listItems = [];
            }
          }

          lines.forEach(function (line) {
            var trimmed = line.trim();

            if (trimmed.startsWith("```")) {
              if (inCode) {
                html.push("<pre><code>" + escapeHtml(codeLines.join("\n")) + "</code></pre>");
                codeLines = [];
                inCode = false;
              } else {
                flushParagraph();
                flushList();
                inCode = true;
              }
              return;
            }

            if (inCode) {
              codeLines.push(line);
              return;
            }

            if (!trimmed) {
              flushParagraph();
              flushList();
              return;
            }

            var heading = trimmed.match(/^(#{1,3})\s+(.+)$/);
            if (heading) {
              flushParagraph();
              flushList();
              var level = heading[1].length;
              html.push("<h" + level + ">" + inlineMarkdown(heading[2]) + "</h" + level + ">");
              return;
            }

            if (trimmed.startsWith("> ")) {
              flushParagraph();
              flushList();
              html.push("<blockquote><p>" + inlineMarkdown(trimmed.slice(2)) + "</p></blockquote>");
              return;
            }

            var listMatch = trimmed.match(/^[-*]\s+(.+)$/);
            if (listMatch) {
              flushParagraph();
              listItems.push(listMatch[1]);
              return;
            }

            paragraph.push(trimmed);
          });

          flushParagraph();
          flushList();
          if (inCode) {
            html.push("<pre><code>" + escapeHtml(codeLines.join("\n")) + "</code></pre>");
          }
          return html.join("\n");
        }

        function inlineMarkdown(value) {
          var codeSpans = [];
          var html = escapeHtml(value).replace(/`([^`]+)`/g, function (_, code) {
            var token = "\u0000CODE" + codeSpans.length + "\u0000";
            codeSpans.push("<code>" + escapeHtml(code) + "</code>");
            return token;
          });

          html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, function (_, alt, url) {
            return '<img src="' + safeUrl(url) + '" alt="' + escapeAttribute(alt) + '" loading="lazy">';
          });
          html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function (_, label, url) {
            return '<a href="' + safeUrl(url) + '" rel="noopener noreferrer">' + label + "</a>";
          });
          html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
          html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");

          codeSpans.forEach(function (code, index) {
            html = html.replace("\u0000CODE" + index + "\u0000", code);
          });
          return html;
        }

        function safeUrl(value) {
          var url = String(value || "").trim();
          if (!url) return "#";
          if (/^(https?:|mailto:|#|\/|\.\/|\.\.\/)/i.test(url)) {
            return escapeAttribute(url);
          }
          if (/^[a-z][a-z0-9+.-]*:/i.test(url)) {
            return "#";
          }
          return escapeAttribute(url);
        }

        function escapeHtml(value) {
          return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
        }

        function escapeAttribute(value) {
          return escapeHtml(value).replace(/`/g, "&#096;");
        }
      })();
    </script>
  </body>
</html>
